<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Агатик, есть вопрос</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                    radial-gradient(circle at top, #ffd6e8, transparent 35%),
                    linear-gradient(135deg, #ff8fb3, #ffdde8);
            overflow: hidden;
        }

        .card {
            position: relative;
            width: min(92vw, 430px);
            min-height: 360px;
            padding: 42px 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 25px 70px rgba(180, 40, 90, 0.25);
            backdrop-filter: blur(12px);
            text-align: center;

             &.cat {
                 background-image:
                         linear-gradient(rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.55)),
                         url("cat.gif");
                 background-size: cover;
                 background-position: center;
             }
        }

        h1 {
            margin: 0 0 12px;
            color: #b61f5c;
            font-size: clamp(2rem, 6vw, 3rem);
        }

        p {
            color: #7a2447;
            margin-bottom: 36px;
            font-size: 1.05rem;
        }

        .buttons {
            position: relative;
            height: 120px;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 30px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #yes {
            background: #d81b60;
            color: white;
            box-shadow: 0 12px 24px rgba(216, 27, 96, 0.35);
        }

        #yes:hover {
            transform: scale(1.08);
        }

        #no {
            position: relative;
            background: white;
            color: #b61f5c;
            box-shadow: 0 10px 20px rgba(120, 20, 60, 0.15);
        }

        .heart {
            position: fixed;
            color: rgba(255, 255, 255, 0.85);
            animation: floatUp linear infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            from {
                transform: translateY(100vh) scale(0.8);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .message {
            display: none;
            margin-top: 22px;
            color: #b61f5c;
            font-size: 1.35rem;
            font-weight: 800;
        }
    </style>
</head>

<body>
<main class="card">
    <h1>Будешь моей девушкой, Агат? :)</h1>

    <div class="buttons">
        <button id="yes">Да</button>
        <button id="no">Нет</button>
    </div>

    <div class="message" id="message">Прааааавильно :)</div>
</main>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const message = document.getElementById("message");

    const card = document.querySelector(".card");
    const cardRect = card.getBoundingClientRect();
    const noBtnRect = noBtn.getBoundingClientRect();

    function moveNoButton() {
        const maxX = cardRect.width-noBtnRect.width;
        const maxY = cardRect.height-noBtnRect.height;

        const x = cardRect.left + Math.random() * maxX - noBtnRect.left;
        const y = cardRect.top + Math.random() * maxY - noBtnRect.top;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveNoButton();
    });
    noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
        yesBtn.textContent = "Ура";
        noBtn.style.display = "none";
        card.className = 'card cat'
    });

    function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = "♥";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 24 + 16 + "px";
        heart.style.animationDuration = Math.random() * 4 + 4 + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createHeart, 350);
</script>
</body>
</html>
